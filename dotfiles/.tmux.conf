# tmux configuration — deployed by bootstrap/vps.sh

# 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Mouse support
set -g mouse on

# History limit
set -g history-limit 10000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Intuitive pane splitting (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Status bar
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour39,fg=colour232,bold"
set -g status-right " %H:%M "
set -g status-right-style "bg=colour235,fg=colour248"

# Active window in status bar
setw -g window-status-current-style "bg=colour240,fg=colour255,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Reduce escape time (better for vim/neovim)
set -sg escape-time 10

# Focus events (for vim/neovim autoread)
set -g focus-events on
